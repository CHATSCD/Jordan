<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLAME PREP</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Barlow', sans-serif;
  background: #0D0D0D;
  color: #F5EFE6;
  max-width: 480px;
  margin: auto;
  padding: 20px;
}

h1 {
  font-family: 'Bebas Neue', sans-serif;
  text-align: center;
}

.card {
  background: #1A1410;
  padding: 20px;
  border-radius: 12px;
  margin-top: 20px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  background: #FF3D00;
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: opacity 0.15s;
}

button:hover:not(:disabled) {
  opacity: 0.9;
}

button:disabled {
  cursor: default;
  opacity: 0.6;
}

button.correct {
  background: #2ECC71 !important;
  opacity: 1 !important;
  color: #0D0D0D;
}

button.wrong {
  background: #C0392B !important;
  opacity: 1 !important;
}

#feedback {
  margin-top: 14px;
  padding: 12px 14px;
  border-radius: 10px;
  font-size: 0.95rem;
  line-height: 1.4;
  font-weight: 600;
  display: none;
}

#feedback.correct-fb {
  background: #1a3d2b;
  border-left: 4px solid #2ECC71;
  color: #7DFFB3;
  display: block;
}

#feedback.wrong-fb {
  background: #3d1a1a;
  border-left: 4px solid #C0392B;
  color: #FFB3B3;
  display: block;
}

.hidden { display: none; }
</style>
</head>

<body>

<h1>🔥 FLAME PREP</h1>
<p style="text-align:center;">Made for you, babe — go get that job ❤️</p>

<div class="card" id="quiz-card">
  <div id="question"></div>
  <div id="options"></div>
  <div id="feedback" style="margin-top:10px;"></div>
  <button id="nextBtn" class="hidden">Next →</button>
</div>

<script>

// ================= DATA =================
const quizData = [
  {
    q: "Jordan, what temp should hot food be held above?",
    opts: ["120°F","130°F","140°F","150°F"],
    ans: 2,
    exp: "Hot food stays above 140°F to stay safe."
  },
  {
    q: "FIFO stands for?",
    opts: ["First In First Out","Food In Food Out","Fast Inventory","Final Order"],
    ans: 0,
    exp: "First In, First Out — keeps food fresh and reduces waste."
  },
  {
    q: "Cold food must stay below?",
    opts: ["50°F","45°F","41°F","35°F"],
    ans: 2,
    exp: "41°F is the safety line."
  }
];

// ================= ENCOURAGEMENT =================
const correctEncouragements = [
  "That’s right, babe 😌",
  "Yesss Jordan, that’s exactly it",
  "I knew you’d get that 💪",
  "Okay Craig, I see you 👀",
  "That’s my man right there ❤️",
  "Good job babe, keep going",
  "You’re locked in now 🔥",
  "See? You know this",
  "Look at you go, goober 😄",
  "Yes!! That’s it Jordan ✅",
];

const wrongEncouragements = [
  "It’s okay babe, you’re learning",
  "Almost, Jordan — you got this",
  "Don’t overthink it, Craig",
  "You’re right there, just tighten it up",
  "Shake it off, next one",
  "It’s all good babe, keep going",
  "You’re still doing great ❤️",
  "Come on goober, you know this 😤",
  "I believe in you, Jordan — reset and go",
];

const miniBoosts = [
  "Stay focused babe, you’re doing good",
  "Keep going Jordan, I’m proud of you",
  "One more step closer, Craig",
  "You got this, don’t second guess yourself",
  "Right here with you ❤️",
  "Don’t stop now, goober 🔥",
  "You’re so close, babe — keep it up",
];

function getRandom(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

// ================= STATE =================
let index = 0;
let score = 0;
let answered = false;

// ================= LOAD =================
function loadQuestion() {
  answered = false;
  const q = quizData[index];

  document.getElementById("question").textContent = q.q;

  const fb = document.getElementById("feedback");
  fb.textContent = "";
  fb.className = "";

  document.getElementById("nextBtn").classList.add("hidden");

  const optWrap = document.getElementById("options");
  optWrap.innerHTML = "";

  q.opts.forEach((opt, i) => {
    const btn = document.createElement("button");
    btn.textContent = opt;
    btn.onclick = () => answer(i);
    optWrap.appendChild(btn);
  });
}

// ================= ANSWER =================
function answer(choice) {
  if (answered) return;
  answered = true;

  const q = quizData[index];
  const fb = document.getElementById("feedback");
  const btns = document.querySelectorAll("#options button");

  btns.forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.ans) btn.classList.add("correct");
    if (i === choice && choice !== q.ans) btn.classList.add("wrong");
  });

  if (choice === q.ans) {
    score++;
    fb.className = "correct-fb";
    fb.textContent = getRandom(correctEncouragements) + " — " + q.exp;
  } else {
    fb.className = "wrong-fb";
    fb.textContent = getRandom(wrongEncouragements) + " — " + q.exp;
  }

  document.getElementById("nextBtn").classList.remove("hidden");
}

// ================= NEXT =================
document.getElementById("nextBtn").onclick = () => {
  index++;

  if (index >= quizData.length) {
    const pct = Math.round((score / quizData.length) * 100);
    const closing = score === quizData.length
      ? "Perfect score, Jordan!! I'm so proud of you 🏆❤️"
      : score >= quizData.length / 2
        ? getRandom(correctEncouragements)
        : "It's okay babe — we run it back and you'll nail it 💪";

    document.getElementById("quiz-card").innerHTML =
      `<h2 style="font-family:'Bebas Neue',sans-serif;font-size:2rem;">${closing}</h2>
       <p style="font-size:1.2rem;margin-top:8px;">You got <strong>${score}/${quizData.length}</strong> (${pct}%), babe ❤️</p>
       <button onclick="location.reload()" style="margin-top:20px;">Run it back 🔁</button>`;
    return;
  }

  document.getElementById("question").textContent = getRandom(miniBoosts);
  document.getElementById("feedback").className = "";
  document.getElementById("feedback").textContent = "";

  setTimeout(loadQuestion, 900);
};

// INIT
loadQuestion();

</script>

</body>
</html>
