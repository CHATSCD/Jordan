<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>BK Manager Prep • Jordan's Hustle</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --fire: #FF6B00;
      --flame: #FF3D00;
      --gold: #FFB800;
      --dark: #0D0D0D;
      --card-bg: #1A1410;
      --red: #C8102E;
      --text: #F5EFE6;
      --muted: #8A7A6A;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Barlow', sans-serif;
      background: var(--dark);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 50% 110%, rgba(255,107,0,0.18) 0%, rgba(200,16,46,0.08) 40%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      max-width: 480px;
      margin: 0 auto;
      padding: 0 16px 80px;
    }

    header {
      text-align: center;
      padding: 32px 0 20px;
      position: relative;
    }

    .logo-flame {
      font-size: 32px;
      animation: flicker 2s ease-in-out infinite;
    }

    @keyframes flicker {
      0%,100% { opacity: 1; transform: scaleY(1); }
      50% { opacity: 0.85; transform: scaleY(0.97); }
    }

    header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 42px;
      letter-spacing: 3px;
      background: linear-gradient(135deg, var(--gold) 0%, var(--fire) 50%, var(--flame) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin: 4px 0 2px;
    }

    header p {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .nav-tabs {
      display: flex;
      gap: 6px;
      margin: 20px 0 24px;
      background: rgba(255,255,255,0.04);
      padding: 5px;
      border-radius: 14px;
    }

    .tab {
      flex: 1;
      padding: 10px 6px;
      border: none;
      border-radius: 10px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.25s;
      background: transparent;
      color: var(--muted);
    }

    .tab.active {
      background: linear-gradient(135deg, var(--flame), var(--fire));
      color: white;
      box-shadow: 0 4px 16px rgba(255,61,0,0.4);
    }

    .screen { display: none; }
    .screen.active { display: block; animation: fadeIn 0.3s ease; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .section-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--fire);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, rgba(255,107,0,0.3), transparent);
    }

    .flashcard-wrap {
      perspective: 1200px;
      margin-bottom: 20px;
    }

    .flashcard {
      width: 100%;
      min-height: 220px;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
    }

    .flashcard.flipped { transform: rotateY(180deg); }

    .card-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 20px;
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .card-front {
      background: linear-gradient(145deg, #1E1510, #271A0F);
      border: 1px solid rgba(255,107,0,0.2);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,184,0,0.1);
    }

    .card-back {
      background: linear-gradient(145deg, #1A0E08, #2A1505);
      border: 1px solid rgba(255,184,0,0.25);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,184,0,0.15);
      transform: rotateY(180deg);
    }

    .card-category {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--fire);
      margin-bottom: 12px;
    }

    .card-question {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 22px;
      font-weight: 700;
      line-height: 1.3;
      color: var(--text);
      flex: 1;
      display: flex;
      align-items: center;
    }

    .card-hint {
      font-size: 11px;
      color: var(--muted);
      margin-top: 16px;
      text-align: center;
      letter-spacing: 1px;
    }

    .card-answer {
      font-size: 15px;
      line-height: 1.6;
      color: #E8D5B0;
      flex: 1;
    }

    .card-answer strong {
      color: var(--gold);
      display: block;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .card-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .nav-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 1px solid rgba(255,107,0,0.3);
      background: rgba(255,107,0,0.08);
      color: var(--fire);
      font-size: 20px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .nav-btn:hover { background: rgba(255,107,0,0.2); transform: scale(1.05); }
    .nav-btn:disabled { opacity: 0.3; cursor: default; transform: none; }

    .card-counter {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 15px;
      color: var(--muted);
      letter-spacing: 1px;
      text-align: center;
      flex: 1;
    }

    .card-counter span { color: var(--gold); font-size: 22px; font-weight: 700; }

    .cat-filter {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .cat-btn {
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      background: transparent;
      color: var(--muted);
      font-family: 'Barlow', sans-serif;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .cat-btn.active {
      border-color: var(--fire);
      background: rgba(255,107,0,0.15);
      color: var(--fire);
    }

    .quiz-progress {
      height: 6px;
      background: rgba(255,255,255,0.08);
      border-radius: 99px;
      margin-bottom: 20px;
      overflow: hidden;
    }

    .quiz-progress-bar {
      height: 100%;
      background: linear-gradient(to right, var(--flame), var(--gold));
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    .quiz-card {
      background: linear-gradient(145deg, #1E1510, #271A0F);
      border: 1px solid rgba(255,107,0,0.2);
      border-radius: 20px;
      padding: 28px 24px;
      margin-bottom: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .quiz-q-num {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--fire);
      margin-bottom: 10px;
    }

    .quiz-question {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 22px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 20px;
    }

    .quiz-options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .quiz-opt {
      padding: 14px 18px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.03);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
    }

    .quiz-opt:hover:not(:disabled) {
      border-color: var(--fire);
      background: rgba(255,107,0,0.1);
      transform: translateX(4px);
    }

    .quiz-opt.correct {
      border-color: #4CAF50;
      background: rgba(76,175,80,0.15);
      color: #81C784;
    }

    .quiz-opt.wrong {
      border-color: var(--red);
      background: rgba(200,16,46,0.15);
      color: #EF9A9A;
    }

    .quiz-opt:disabled { cursor: default; }

    .quiz-feedback {
      border-radius: 12px;
      padding: 14px 18px;
      margin-top: 12px;
      font-size: 14px;
      line-height: 1.5;
      display: none;
    }

    .quiz-feedback.show { display: block; animation: fadeIn 0.3s ease; }
    .quiz-feedback.correct-fb { background: rgba(76,175,80,0.1); border: 1px solid rgba(76,175,80,0.3); color: #A5D6A7; }
    .quiz-feedback.wrong-fb { background: rgba(200,16,46,0.1); border: 1px solid rgba(200,16,46,0.3); color: #FFCDD2; }

    .next-btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--flame), var(--fire));
      color: white;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
      display: none;
      box-shadow: 0 4px 20px rgba(255,61,0,0.4);
    }

    .next-btn.show { display: block; animation: fadeIn 0.3s ease; }
    .next-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(255,61,0,0.5); }

    .score-screen {
      text-align: center;
      padding: 30px 10px;
      display: none;
    }

    .score-screen.show { display: block; animation: fadeIn 0.4s ease; }

    .score-circle {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--flame), var(--gold));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      box-shadow: 0 0 40px rgba(255,107,0,0.5);
    }

    .score-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 52px;
      color: white;
      line-height: 1;
    }

    .score-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.8);
    }

    .score-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      letter-spacing: 2px;
      color: var(--gold);
      margin-bottom: 8px;
    }

    .score-msg {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 24px;
      max-width: 280px;
      margin-left: auto;
      margin-right: auto;
    }

    .restart-btn {
      padding: 14px 40px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--flame), var(--fire));
      color: white;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(255,61,0,0.4);
      transition: all 0.2s;
    }

    .restart-btn:hover { transform: translateY(-2px); }

    .tip-card {
      background: linear-gradient(145deg, #1E1510, #271A0F);
      border: 1px solid rgba(255,107,0,0.15);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 12px;
      transition: all 0.2s;
    }

    .tip-card:hover { border-color: rgba(255,107,0,0.35); transform: translateY(-2px); }

    .tip-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .tip-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, rgba(255,61,0,0.3), rgba(255,184,0,0.2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .tip-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--gold);
    }

    .tip-body {
      font-size: 13px;
      line-height: 1.6;
      color: #C4B49A;
    }

    .tip-body ul { padding-left: 16px; margin-top: 6px; }
    .tip-body li { margin-bottom: 4px; }

    .stars {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-bottom: 12px;
      font-size: 22px;
    }
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo-flame">🔥</div>
    <h1>FLAME PREP</h1>
    <p>Jordan's BK Interview Prep</p>
  </header>

  <nav class="nav-tabs">
    <button class="tab active" onclick="switchTab('flashcards')">Flash Cards</button>
    <button class="tab" onclick="switchTab('quiz')">Quiz</button>
    <button class="tab" onclick="switchTab('tips')">Tips</button>
  </nav>

  <!-- FLASHCARDS SCREEN -->
  <div id="screen-flashcards" class="screen active">
    <div class="section-label">Study Mode</div>
    <div class="cat-filter" id="cat-filter"></div>
    <div class="flashcard-wrap">
      <div class="flashcard" id="flashcard" onclick="flipCard()">
        <div class="card-face card-front">
          <div class="card-category" id="fc-category"></div>
          <div class="card-question" id="fc-question"></div>
          <div class="card-hint">Tap to reveal answer 👆</div>
        </div>
        <div class="card-face card-back">
          <div class="card-answer" id="fc-answer"></div>
        </div>
      </div>
    </div>
    <div class="card-nav">
      <button class="nav-btn" id="prev-btn" onclick="prevCard()">←</button>
      <div class="card-counter"><span id="card-current">1</span> / <span id="card-total">1</span></div>
      <button class="nav-btn" id="next-btn" onclick="nextCard()">→</button>
    </div>
  </div>

  <!-- QUIZ SCREEN -->
  <div id="screen-quiz" class="screen">
    <div class="section-label">Test Yourself</div>
    <div class="quiz-progress"><div class="quiz-progress-bar" id="quiz-bar"></div></div>
    <div id="quiz-area">
      <div class="quiz-card">
        <div class="quiz-q-num" id="quiz-q-num"></div>
        <div class="quiz-question" id="quiz-q-text"></div>
        <div class="quiz-options" id="quiz-options"></div>
        <div class="quiz-feedback" id="quiz-feedback"></div>
      </div>
      <button class="next-btn" id="quiz-next" onclick="nextQuestion()">Next Question →</button>
    </div>
    <div class="score-screen" id="score-screen">
      <div class="stars" id="score-stars"></div>
      <div class="score-circle">
        <div class="score-num" id="score-num"></div>
        <div class="score-label">CORRECT</div>
      </div>
      <div class="score-title" id="score-title"></div>
      <div class="score-msg" id="score-msg"></div>
      <button class="restart-btn" onclick="restartQuiz()">🔥 Try Again</button>
    </div>
  </div>

  <!-- TIPS SCREEN -->
  <div id="screen-tips" class="screen">
    <div class="section-label">Interview Playbook</div>
    <div id="tips-list"></div>
  </div>
</div>

<script>
  // ==================== DATA ====================
  const flashcards = [
    { cat: "Operations", q: "Jordan, what is Burger King's approach to food safety?", a: "<strong>How to Answer</strong>Show them you know your stuff, Jordan — mention HAACP principles, daily temp checks, and proper holding times. Hot food stays above 140°F, cold below 41°F. Always document." },
    { cat: "Operations", q: "Jordan, how do you handle a rush period with low staffing?", a: "<strong>How to Answer</strong>Prioritize drive-thru speed first. Cross-train your team so they can flex between stations. Put your best people where the pressure is highest. Stay calm — your energy is contagious." },
    { cat: "Operations", q: "Jordan, what is the correct cook time for a Whopper patty?", a: "<strong>How to Answer</strong>BK's secret is the flame broiler. Each protein has a specific belt speed setting — never rush it. Your job is making sure the broiler is calibrated correctly." },
    { cat: "Operations", q: "Jordan, what does FIFO mean and why does it matter?", a: "<strong>How to Answer</strong>First In, First Out. Older stock always rotates to the front. Nail this and you reduce spoilage, cut waste costs, and guarantee fresh product every single time." },
    { cat: "Operations", q: "Jordan, how do you handle a food quality complaint mid-shift?", a: "<strong>How to Answer</strong>Make it right immediately — no hesitation. Apologize sincerely, replace the item, no questions asked. Then log it and track down the root cause." },
    { cat: "Leadership", q: "Jordan, how would you motivate a team during a slow or difficult shift?", a: "<strong>How to Answer</strong>Lead from the front. Stay upbeat, call out small wins publicly, and set fun mini-goals. Your attitude sets the floor's whole vibe." },
    { cat: "Leadership", q: "Jordan, how do you handle a conflict between two employees?", a: "<strong>How to Answer</strong>Act fast and keep it private. Hear both sides separately, find common ground, and set clear expectations. Document anything recurring." },
    { cat: "Leadership", q: "Jordan, describe your coaching style.", a: "<strong>How to Answer</strong>Show, do together, watch, then feedback. Be specific with praise and corrections. Praise publicly, correct privately." },
    { cat: "Leadership", q: "Jordan, how would you handle an underperforming team member?", a: "<strong>How to Answer</strong>Start with a real conversation — not a write-up. Understand why first. Then set clear, measurable expectations and actually follow up." },
    { cat: "Leadership", q: "Jordan, what does 'leading by example' look like on a shift?", a: "<strong>How to Answer</strong>It means getting your hands dirty. Jumping on the floor during a rush, busing tables, cleaning. If you're moving fast and staying positive, your team mirrors that energy." },
    { cat: "Financials", q: "Jordan, what is food cost percentage and how do you control it?", a: "<strong>How to Answer</strong>Food cost % = Cost of Food ÷ Total Sales × 100. Target is 28–32% in QSR. Control it by reducing waste, enforcing proper portioning, and accurate inventory." },
    { cat: "Financials", q: "Jordan, how does labor cost impact the store's profitability?", a: "<strong>How to Answer</strong>Labor typically runs 25–35% of revenue. Schedule smart — enough people for quality service, but not so many that you're bleeding hours." },
    { cat: "Financials", q: "Jordan, what is upselling and why does it matter?", a: "<strong>How to Answer</strong>It's the art of the add-on. Even just +$0.50 per transaction compounds to thousands a month. Train your crew to do it naturally." },
    { cat: "Financials", q: "Jordan, how do you reduce waste without hurting quality?", a: "<strong>How to Answer</strong>Use your sales history to predict demand. Stick to proper hold times. Review discard logs daily and coach the team on portion control." },
    { cat: "BK Brand", q: "Jordan, what is Burger King's brand promise?", a: "<strong>How to Answer</strong>'Be Your Way' — BK celebrates individuality. As an AM, you bring that promise to life every shift." },
    { cat: "BK Brand", q: "Jordan, what sets BK apart from McDonald's and Wendy's?", a: "<strong>How to Answer</strong>Three things: flame-grilling, radical customization, and the Whopper. BK has a rebel edge." },
    { cat: "BK Brand", q: "Jordan, what is BK's Guest Trac system?", a: "<strong>How to Answer</strong>It's BK's customer satisfaction measurement tool. Scores speed, accuracy, friendliness, and cleanliness." },
    { cat: "BK Brand", q: "Jordan, what are the core metrics an AM should track daily?", a: "<strong>How to Answer</strong>Drive-thru speed, order accuracy, food cost %, labor %, Guest Trac scores, and health inspection readiness." },
    { cat: "Situational", q: "Jordan, a customer is yelling at your cashier. What do you do?", a: "<strong>How to Answer</strong>Step in immediately and calmly. Redirect the customer to you. Listen fully, apologize genuinely, and resolve it." },
    { cat: "Situational", q: "Jordan, the GM calls out and you're in charge. What's your first move?", a: "<strong>How to Answer</strong>Assess your crew and sales volume. Fill critical gaps. Brief the team. Stay visible on the floor." },
    { cat: "Situational", q: "Jordan, you catch an employee violating food safety. What do you do?", a: "<strong>How to Answer</strong>Correct it on the spot — food safety is never negotiable. Pull them aside privately, explain the risk, and document." },
    { cat: "Situational", q: "Jordan, sales are down 15% vs last year. How do you investigate?", a: "<strong>How to Answer</strong>Check external factors first. Review speed and accuracy scores. Mystery shop your own location. Build a real recovery plan." },
  ];

  const quizData = [
    { q: "Jordan, what temperature must hot food be held above to stay safe?", opts: ["120°F","130°F","140°F","150°F"], ans: 2, exp: "Hot food stays above 140°F. Below that is the danger zone." },
    { q: "Jordan, FIFO stands for:", opts: ["First In, First Out","Food In, Food Out","Fast Inventory","Final Order"], ans: 0, exp: "First In, First Out. Older stock moves to the front." },
    { q: "Jordan, what is a typical food cost % target for a QSR like BK?", opts: ["15–20%","28–32%","40–45%","50%+"], ans: 1, exp: "28–32% is the target. Food cost % = Cost of food sold ÷ Total revenue × 100." },
    { q: "Jordan, BK's brand tagline is:", opts: ["'I'm Lovin' It'","'Eat Fresh'","'Be Your Way'","'Taste the Fire'"], ans: 2, exp: "'Be Your Way' — individuality and customization." },
    { q: "Jordan, a customer says their Whopper was made wrong. Your FIRST action?", opts: ["Ask to see the receipt","Tell them to check next time","Apologize and replace it immediately","Offer a discount next visit"], ans: 2, exp: "Immediate replacement, no friction." },
    { q: "Jordan, cold food must be kept below what temperature?", opts: ["50°F","45°F","41°F","35°F"], ans: 2, exp: "41°F is the line. Above that enters the danger zone." },
    { q: "Jordan, labor cost is typically what % of QSR revenue?", opts: ["10–15%","25–35%","45–50%","55–60%"], ans: 1, exp: "25–35%. Smart scheduling is your biggest lever." },
    { q: "Jordan, what system does BK use to measure customer satisfaction?", opts: ["Net Promoter Score","Guest Trac","CSAT Dashboard","Mystery Audit Pro"], ans: 1, exp: "Guest Trac — speed, accuracy, cleanliness, friendliness." },
    { q: "Jordan, two employees are arguing loudly in the kitchen. Best first step?", opts: ["Fire them both","Let them work it out","Separate them and address each privately","Ignore it"], ans: 2, exp: "Separate and address privately. Never let conflict escalate in front of the team." },
    { q: "Jordan, what makes BK's cooking method unique in QSR?", opts: ["Deep frying","Steam cooking","Flame-grilling","Air frying"], ans: 2, exp: "Flame-grilling — nobody else does it." },
  ];

  const tips = [
    { icon: "🎯", title: "Jordan, Research Before You Walk In", body: "<ul><li>Know BK's current promotions cold</li><li>Look up that location's Google reviews</li><li>Review 'Be Your Way' deeply</li></ul>" },
    { icon: "💬", title: "Jordan, Use the STAR Method", body: "Situation, Task, Action, Result. Always say what YOU specifically did." },
    { icon: "🔥", title: "Jordan, Show Your Passion for the Floor", body: "BK promotes managers who love being in the action. Have 2–3 real stories ready." },
    { icon: "📊", title: "Jordan, Know Your Numbers Cold", body: "Food cost, labor %, drive-thru speed targets. Even estimating shows analytical thinking." },
    { icon: "🤝", title: "Jordan, Lead With Conflict Resolution Stories", body: "AM roles are 70% people. Prepare stories of how you resolved crew conflict or de-escalated a tough customer." },
    { icon: "❓", title: "Jordan, Ask These Questions", body: "<ul><li>'What does success look like in my first 90 days?'</li><li>'What are this location's biggest challenges?'</li></ul>" },
    { icon: "👔", title: "Jordan, Presence Matters", body: "Business casual, 10 minutes early, firm handshake, real eye contact." },
    { icon: "🧠", title: "Jordan, Think in Systems", body: "Great AMs build systems that prevent problems. Talk about checklists and standardized training." },
  ];

  // ==================== ENCOURAGEMENT POOLS (personalized tone) ====================
  const correctEncouragements = [
    "Yesss Jordan, that's exactly it! 🎯", "I knew you'd get that 💪", "You're locked in now 🔥",
    "See? You know this stuff, Jordan!", "That's right — keep that energy!", "Jordan's got it! 🙌",
    "You're ready for this interview, no doubt.", "That's the one. You're on fire 🔥",
    "Okay Craig, I see you 👀", "That’s my man right there ❤️", "Look at you go, goober 😄",
  ];

  const wrongEncouragements = [
    "It's okay Jordan, you're learning — that's the point.", "Almost! You're right there, just tighten it up.",
    "Don't overthink it, Jordan — shake it off.", "You're still doing great ❤️ keep going.",
    "One slip doesn't define you. Next one's yours.", "You got this, Jordan — next question.",
    "It's all good — review it and move on strong.", "Come on goober, you know this 😤",
  ];

  const miniBoosts = [
    "Stay focused Jordan, you're doing good 👊", "Keep going Jordan, I'm proud of you ❤️",
    "One more step closer to that manager role 🔥", "You got this — don't second guess yourself.",
    "Right here with you, Jordan. Let's go.", "Every question makes you sharper. Keep it up.",
    "You're building something real here, Jordan.", "Don't stop now, goober 🔥",
  ];

  function getRandom(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  // ==================== STATE ====================
  let currentCard = 0;
  let filteredCards = [...flashcards];
  let activeCategory = 'All';

  // --- DRILL-DOWN QUIZ STATE ---
  const MAX_DRILL_ROUNDS = 3;
  let quizQueue = [...quizData].sort(() => Math.random() - 0.5);
  let weakSpots = [];
  let quizIndex = 0;
  let roundNum = 1;
  let firstPassScore = 0;
  let quizAnswered = false;

  // ==================== TABS ====================
  function switchTab(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('screen-' + id).classList.add('active');
    event.target.classList.add('active');
  }

  // ==================== FLASHCARDS ====================
  const categories = ['All', ...new Set(flashcards.map(f => f.cat))];

  function buildCatFilter() {
    const wrap = document.getElementById('cat-filter');
    categories.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'cat-btn' + (cat === 'All' ? ' active' : '');
      btn.textContent = cat;
      btn.onclick = () => {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeCategory = cat;
        filteredCards = cat === 'All' ? [...flashcards] : flashcards.filter(f => f.cat === cat);
        currentCard = 0;
        updateCard();
      };
      wrap.appendChild(btn);
    });
  }

  function updateCard() {
    const card = filteredCards[currentCard];
    document.getElementById('fc-category').textContent = card.cat.toUpperCase();
    document.getElementById('fc-question').textContent = card.q;
    document.getElementById('fc-answer').innerHTML = card.a;
    document.getElementById('card-current').textContent = currentCard + 1;
    document.getElementById('card-total').textContent = filteredCards.length;
    document.getElementById('prev-btn').disabled = currentCard === 0;
    document.getElementById('next-btn').disabled = currentCard === filteredCards.length - 1;
    document.getElementById('flashcard').classList.remove('flipped');
  }

  function flipCard() {
    document.getElementById('flashcard').classList.toggle('flipped');
  }

  function prevCard() {
    if (currentCard > 0) { currentCard--; updateCard(); }
  }

  function nextCard() {
    if (currentCard < filteredCards.length - 1) { currentCard++; updateCard(); }
  }

  // ==================== QUIZ (with drill-down) ====================
  function loadQuestion() {
    const q = quizQueue[quizIndex];
    const total = quizQueue.length;
    quizAnswered = false;

    document.getElementById('quiz-q-num').textContent = `Question ${quizIndex + 1} of ${total}${roundNum > 1 ? ' (drill)' : ''}`;
    document.getElementById('quiz-q-text').textContent = q.q;
    document.getElementById('quiz-bar').style.width = `${(quizIndex / total) * 100}%`;
    document.getElementById('quiz-next').classList.remove('show');

    const fb = document.getElementById('quiz-feedback');
    fb.classList.remove('show', 'correct-fb', 'wrong-fb');

    const optWrap = document.getElementById('quiz-options');
    optWrap.innerHTML = '';
    q.opts.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'quiz-opt';
      btn.textContent = opt;
      btn.onclick = () => answerQuestion(i);
      optWrap.appendChild(btn);
    });
  }

  function answerQuestion(chosen) {
    if (quizAnswered) return;
    quizAnswered = true;

    const q = quizQueue[quizIndex];
    const opts = document.querySelectorAll('.quiz-opt');
    const fb = document.getElementById('quiz-feedback');

    opts.forEach((btn, i) => {
      btn.disabled = true;
      if (i === q.ans) btn.classList.add('correct');
      if (i === chosen && i !== q.ans) btn.classList.add('wrong');
    });

    if (chosen === q.ans) {
      if (roundNum === 1) firstPassScore++;
      const msg = getRandom(correctEncouragements);
      fb.className = 'quiz-feedback show correct-fb';
      fb.textContent = '✅ ' + msg + ' — ' + q.exp;
    } else {
      if (!weakSpots.some(item => item.q === q.q)) {
        weakSpots.push(q);
      }
      const msg = getRandom(wrongEncouragements);
      fb.className = 'quiz-feedback show wrong-fb';
      fb.textContent = '❌ ' + msg + ' — ' + q.exp;
    }

    document.getElementById('quiz-next').classList.add('show');
  }

  function nextQuestion() {
    quizIndex++;
    if (quizIndex >= quizQueue.length) {
      if (weakSpots.length > 0 && roundNum < MAX_DRILL_ROUNDS) {
        startDrillRound();
      } else {
        showScore();
      }
      return;
    }

    const qText = document.getElementById('quiz-q-text');
    const boost = getRandom(miniBoosts);
    qText.textContent = boost;
    document.getElementById('quiz-next').classList.remove('show');
    setTimeout(() => {
      loadQuestion();
    }, 1100);
  }

  function startDrillRound() {
    roundNum++;
    quizQueue = [...weakSpots].sort(() => Math.random() - 0.5);
    weakSpots = [];
    quizIndex = 0;

    document.getElementById('quiz-q-text').textContent = "🔁 Locking in your weak spots, Jordan...";
    document.getElementById('quiz-options').innerHTML = '';
    document.getElementById('quiz-feedback').classList.remove('show', 'correct-fb', 'wrong-fb');
    document.getElementById('quiz-next').classList.remove('show');

    setTimeout(() => {
      loadQuestion();
    }, 1300);
  }

  function showScore() {
    document.getElementById('quiz-area').style.display = 'none';
    const ss = document.getElementById('score-screen');
    ss.classList.add('show');

    const pct = Math.round((firstPassScore / quizData.length) * 100);
    document.getElementById('score-num').textContent = `${firstPassScore}/${quizData.length}`;
    document.getElementById('quiz-bar').style.width = '100%';

    let title, msg, stars;
    if (pct >= 90) { title = "Jordan's On Fire!"; msg = "Outstanding! You're ready to lead the flame. Walk in with your head high."; stars = "🔥🔥🔥🔥🔥"; }
    else if (pct >= 70) { title = "Getting Grilled Right"; msg = "Solid run, Jordan! Review the ones you missed and you'll be fully interview-ready."; stars = "🔥🔥🔥🔥"; }
    else if (pct >= 50) { title = "Warming Up, Jordan"; msg = "Good start! Go back through the flashcards for the topics you missed."; stars = "🔥🔥🔥"; }
    else { title = "Keep Going, Jordan"; msg = "That's what practice is for! Review the flashcards and tips, then try again."; stars = "🔥🔥"; }

    document.getElementById('score-title').textContent = title;
    document.getElementById('score-msg').textContent = msg;
    document.getElementById('score-stars').textContent = stars;
  }

  function restartQuiz() {
    quizQueue = [...quizData].sort(() => Math.random() - 0.5);
    weakSpots = [];
    quizIndex = 0;
    roundNum = 1;
    firstPassScore = 0;
    document.getElementById('quiz-area').style.display = 'block';
    document.getElementById('score-screen').classList.remove('show');
    loadQuestion();
  }

  // ==================== TIPS ====================
  function buildTips() {
    const wrap = document.getElementById('tips-list');
    tips.forEach(t => {
      wrap.innerHTML += `
        <div class="tip-card">
          <div class="tip-header">
            <div class="tip-icon">${t.icon}</div>
            <div class="tip-title">${t.title}</div>
          </div>
          <div class="tip-body">${t.body}</div>
        </div>`;
    });
  }

  // ==================== INIT ====================
  buildCatFilter();
  updateCard();
  loadQuestion();
  buildTips();
</script>
</body>
</html>
