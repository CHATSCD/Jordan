<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>BK Manager Prep • Jordan</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --fire: #FF6B00;
      --flame: #FF3D00;
      --gold: #FFB800;
      --dark: #0D0D0D;
      --card-bg: #1A1410;
      --red: #C8102E;
      --text: #F5EFE6;
      --muted: #8A7A6A;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Barlow', sans-serif;
      background: var(--dark);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 50% 110%, rgba(255,107,0,0.18) 0%, rgba(200,16,46,0.08) 40%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      max-width: 480px;
      margin: 0 auto;
      padding: 0 16px 80px;
    }

    header {
      text-align: center;
      padding: 32px 0 20px;
      position: relative;
    }

    .logo-flame {
      font-size: 32px;
      animation: flicker 2s ease-in-out infinite;
    }

    @keyframes flicker {
      0%,100% { opacity: 1; transform: scaleY(1); }
      50% { opacity: 0.85; transform: scaleY(0.97); }
    }

    header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 42px;
      letter-spacing: 3px;
      background: linear-gradient(135deg, var(--gold) 0%, var(--fire) 50%, var(--flame) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin: 4px 0 2px;
    }

    header p {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .nav-tabs {
      display: flex;
      gap: 6px;
      margin: 20px 0 24px;
      background: rgba(255,255,255,0.04);
      padding: 5px;
      border-radius: 14px;
    }

    .tab {
      flex: 1;
      padding: 10px 6px;
      border: none;
      border-radius: 10px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.25s;
      background: transparent;
      color: var(--muted);
    }

    .tab.active {
      background: linear-gradient(135deg, var(--flame), var(--fire));
      color: white;
      box-shadow: 0 4px 16px rgba(255,61,0,0.4);
    }

    .screen { display: none; }
    .screen.active { display: block; animation: fadeIn 0.3s ease; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .section-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--fire);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, rgba(255,107,0,0.3), transparent);
    }

    .flashcard-wrap {
      perspective: 1200px;
      margin-bottom: 20px;
    }

    .flashcard {
      width: 100%;
      min-height: 220px;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
    }

    .flashcard.flipped { transform: rotateY(180deg); }

    .card-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 20px;
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .card-front {
      background: linear-gradient(145deg, #1E1510, #271A0F);
      border: 1px solid rgba(255,107,0,0.2);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,184,0,0.1);
    }

    .card-back {
      background: linear-gradient(145deg, #1A0E08, #2A1505);
      border: 1px solid rgba(255,184,0,0.25);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,184,0,0.15);
      transform: rotateY(180deg);
    }

    .card-category {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--fire);
      margin-bottom: 12px;
    }

    .card-question {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 22px;
      font-weight: 700;
      line-height: 1.3;
      color: var(--text);
      flex: 1;
      display: flex;
      align-items: center;
    }

    .card-hint {
      font-size: 11px;
      color: var(--muted);
      margin-top: 16px;
      text-align: center;
      letter-spacing: 1px;
    }

    .card-answer {
      font-size: 15px;
      line-height: 1.6;
      color: #E8D5B0;
      flex: 1;
    }

    .card-answer strong {
      color: var(--gold);
      display: block;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .card-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .nav-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 1px solid rgba(255,107,0,0.3);
      background: rgba(255,107,0,0.08);
      color: var(--fire);
      font-size: 20px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .nav-btn:hover { background: rgba(255,107,0,0.2); transform: scale(1.05); }
    .nav-btn:disabled { opacity: 0.3; cursor: default; transform: none; }

    .card-counter {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 15px;
      color: var(--muted);
      letter-spacing: 1px;
      text-align: center;
      flex: 1;
    }

    .card-counter span { color: var(--gold); font-size: 22px; font-weight: 700; }

    .cat-filter {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .cat-btn {
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      background: transparent;
      color: var(--muted);
      font-family: 'Barlow', sans-serif;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .cat-btn.active {
      border-color: var(--fire);
      background: rgba(255,107,0,0.15);
      color: var(--fire);
    }

    .quiz-progress {
      height: 6px;
      background: rgba(255,255,255,0.08);
      border-radius: 99px;
      margin-bottom: 20px;
      overflow: hidden;
    }

    .quiz-progress-bar {
      height: 100%;
      background: linear-gradient(to right, var(--flame), var(--gold));
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    .quiz-card {
      background: linear-gradient(145deg, #1E1510, #271A0F);
      border: 1px solid rgba(255,107,0,0.2);
      border-radius: 20px;
      padding: 28px 24px;
      margin-bottom: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .quiz-q-num {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--fire);
      margin-bottom: 10px;
    }

    .quiz-question {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 22px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 20px;
    }

    .quiz-options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .quiz-opt {
      padding: 14px 18px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.03);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
    }

    .quiz-opt:hover:not(:disabled) {
      border-color: var(--fire);
      background: rgba(255,107,0,0.1);
      transform: translateX(4px);
    }

    .quiz-opt.correct {
      border-color: #4CAF50;
      background: rgba(76,175,80,0.15);
      color: #81C784;
    }

    .quiz-opt.wrong {
      border-color: var(--red);
      background: rgba(200,16,46,0.15);
      color: #EF9A9A;
    }

    .quiz-opt:disabled { cursor: default; }

    .quiz-feedback {
      border-radius: 12px;
      padding: 14px 18px;
      margin-top: 12px;
      font-size: 14px;
      line-height: 1.5;
      display: none;
    }

    .quiz-feedback.show { display: block; animation: fadeIn 0.3s ease; }
    .quiz-feedback.correct-fb { background: rgba(76,175,80,0.1); border: 1px solid rgba(76,175,80,0.3); color: #A5D6A7; }
    .quiz-feedback.wrong-fb { background: rgba(200,16,46,0.1); border: 1px solid rgba(200,16,46,0.3); color: #FFCDD2; }

    .next-btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--flame), var(--fire));
      color: white;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
      display: none;
      box-shadow: 0 4px 20px rgba(255,61,0,0.4);
    }

    .next-btn.show { display: block; animation: fadeIn 0.3s ease; }
    .next-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(255,61,0,0.5); }

    .score-screen {
      text-align: center;
      padding: 30px 10px;
      display: none;
    }

    .score-screen.show { display: block; animation: fadeIn 0.4s ease; }

    .score-circle {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--flame), var(--gold));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      box-shadow: 0 0 40px rgba(255,107,0,0.5);
    }

    .score-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 52px;
      color: white;
      line-height: 1;
    }

    .score-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.8);
    }

    .score-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      letter-spacing: 2px;
      color: var(--gold);
      margin-bottom: 8px;
    }

    .score-msg {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 24px;
      max-width: 280px;
      margin-left: auto;
      margin-right: auto;
    }

    .restart-btn {
      padding: 14px 40px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--flame), var(--fire));
      color: white;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(255,61,0,0.4);
      transition: all 0.2s;
    }

    .restart-btn:hover { transform: translateY(-2px); }

    .tip-card {
      background: linear-gradient(145deg, #1E1510, #271A0F);
      border: 1px solid rgba(255,107,0,0.15);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 12px;
      transition: all 0.2s;
    }

    .tip-card:hover { border-color: rgba(255,107,0,0.35); transform: translateY(-2px); }

    .tip-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .tip-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, rgba(255,61,0,0.3), rgba(255,184,0,0.2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .tip-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--gold);
    }

    .tip-body {
      font-size: 13px;
      line-height: 1.6;
      color: #C4B49A;
    }

    .tip-body ul { padding-left: 16px; margin-top: 6px; }
    .tip-body li { margin-bottom: 4px; }

    .stars {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-bottom: 12px;
      font-size: 22px;
    }
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo-flame">🔥</div>
    <h1>FLAME PREP</h1>
    <p>Jordan's BK Interview Prep</p>
  </header>

  <nav class="nav-tabs">
    <button class="tab active" onclick="switchTab('flashcards')">Flash Cards</button>
    <button class="tab" onclick="switchTab('quiz')">Quiz</button>
    <button class="tab" onclick="switchTab('tips')">Tips</button>
  </nav>

  <!-- FLASHCARDS SCREEN -->
  <div id="screen-flashcards" class="screen active">
    <div class="section-label">Study Mode</div>
    <div class="cat-filter" id="cat-filter"></div>
    <div class="flashcard-wrap">
      <div class="flashcard" id="flashcard" onclick="flipCard()">
        <div class="card-face card-front">
          <div class="card-category" id="fc-category"></div>
          <div class="card-question" id="fc-question"></div>
          <div class="card-hint">Tap to reveal answer 👆</div>
        </div>
        <div class="card-face card-back">
          <div class="card-answer" id="fc-answer"></div>
        </div>
      </div>
    </div>
    <div class="card-nav">
      <button class="nav-btn" id="prev-btn" onclick="prevCard()">←</button>
      <div class="card-counter"><span id="card-current">1</span> / <span id="card-total">1</span></div>
      <button class="nav-btn" id="next-btn" onclick="nextCard()">→</button>
    </div>
  </div>

  <!-- QUIZ SCREEN -->
  <div id="screen-quiz" class="screen">
    <div class="section-label">Test Yourself</div>
    <div class="quiz-progress"><div class="quiz-progress-bar" id="quiz-bar"></div></div>
    <div id="quiz-area">
      <div class="quiz-card">
        <div class="quiz-q-num" id="quiz-q-num"></div>
        <div class="quiz-question" id="quiz-q-text"></div>
        <div class="quiz-options" id="quiz-options"></div>
        <div class="quiz-feedback" id="quiz-feedback"></div>
      </div>
      <button class="next-btn" id="quiz-next" onclick="nextQuestion()">Next Question →</button>
    </div>
    <div class="score-screen" id="score-screen">
      <div class="stars" id="score-stars"></div>
      <div class="score-circle">
        <div class="score-num" id="score-num"></div>
        <div class="score-label">CORRECT</div>
      </div>
      <div class="score-title" id="score-title"></div>
      <div class="score-msg" id="score-msg"></div>
      <button class="restart-btn" onclick="restartQuiz()">🔥 Try Again</button>
    </div>
  </div>

  <!-- TIPS SCREEN -->
  <div id="screen-tips" class="screen">
    <div class="section-label">Interview Playbook</div>
    <div id="tips-list"></div>
  </div>
</div>

<script>
  // ==================== DATA (rewritten with personal tone) ====================
  const flashcards = [
    { cat: "Leadership", q: "Babe, they're gonna ask what your leadership style is. What do you say?", a: "<strong>Say this, Gobber 👑</strong>You lead by example — period. You don't ask your team to do anything you wouldn't do yourself. You're the first one in and the last to complain. Your team follows because of HOW you show up, not just your title. Have a real story ready — pick one where you stepped up and your crew followed your lead." },
    { cat: "Leadership", q: "Craig, how do you keep a team motivated when the shift gets hard?", a: "<strong>Here's your answer, Babe 🔥</strong>You stay positive and you make sure your team FEELS it. Call out what's going right, not just what's wrong. Set a mini-goal mid-shift — 'let's knock out the next 20 orders clean' — and celebrate when you hit it. Your energy is the thermostat on that floor. You set the temperature, Jordan." },
    { cat: "Leadership", q: "Gobber, how do you earn respect as a new manager?", a: "<strong>Listen up, Craig 👂</strong>You don't demand respect — you build it shift by shift. Show up early. Know the job better than anyone. Be fair every single time. Never throw your team under the bus. Have their back when it matters. THAT is how you earn loyalty. That's who you already are, babe — now go say it out loud." },
    { cat: "Leadership", q: "Babe, a team member just isn't performing. What do you do?", a: "<strong>Lead with empathy first, Gobber 💯</strong>Pull them aside privately — NEVER in front of the crew — and have a real human conversation. Find out WHY before you jump to consequences. Training gap? Personal stuff going on? Set clear expectations with a timeline. Follow up. THEN escalate if nothing changes. Firm but fair — that's you, Craig." },
    { cat: "Leadership", q: "Jordan, how do you handle managing people older or more experienced than you?", a: "<strong>SUPASTAR answer right here 🌟</strong>You respect their experience and you USE it. Ask for their input. Let them feel valued. But be clear about your role and your standards. Age doesn't run the shift — the manager does. You can be respectful AND firm at the same time. That's not a contradiction, babe. That's maturity." },
    { cat: "Leadership", q: "Craig, what's the difference between a boss and a leader?", a: "<strong>THIS one, Gobber 🎯</strong>A boss tells people what to do. A leader makes people WANT to do it. A boss hides behind their title. A leader earns theirs every shift. Tell them you've seen both kinds and you've made your choice. Then back it up with a real example from your experience. Bye, generic answers — we're giving them the real Craig." },
    { cat: "Leadership", q: "Babe, how do you build a strong team culture?", a: "<strong>Real talk, Jordan 💬</strong>Culture is built in the small moments — how you speak to people when they mess up, whether you say thank you, whether you go to bat for your crew with upper management. Celebrate wins. Correct privately, praise publicly. You want your team to actually WANT to come to work. That starts with YOU, and you're already that kind of person." },
    { cat: "Work Ethic", q: "Gobber, why should they trust you to run the store alone?", a: "<strong>Say this with your chest, Babe 💪</strong>Because trust is built through consistency, not promises. You show up when you say you will. You do the job right even when no one is watching. You treat their business like it is YOUR business. That level of ownership — that's what they're really asking about. And that's exactly who Craig is." },
    { cat: "Work Ethic", q: "Jordan, describe a time you went above and beyond at work.", a: "<strong>Time to shine, Gobber ✨</strong>Think of a REAL moment — covered a shift last minute, stayed late to fix something, trained someone on your day off. Tell THAT story using STAR: Situation, Task, Action, Result. Specific and personal beats vague and impressive every time. Bye, generic answers! Give them the real you." },
    { cat: "Work Ethic", q: "Craig, how do you handle it when work gets overwhelming?", a: "<strong>Don't say you panic, babe 😤</strong>Tell them you take a breath, triage, and tackle the most urgent thing first. You communicate with your team so everyone's working the same plan. You don't disappear when it gets hard — you show up HARDER. That's what separates ASMs from regular crew. That's what separates you, Jordan." },
    { cat: "Work Ethic", q: "Gobber, how do you handle being asked to do something you disagree with?", a: "<strong>Careful here, Craig 🎯</strong>You voice your concern privately and professionally — one time. Then you execute the decision. You are not a yes-man but you are not insubordinate either. Tell them you handle disagreements through the right channels, not in front of the team. Professionalism over pride. Every. Single. Time." },
    { cat: "Work Ethic", q: "Babe, what does accountability look like to you as a manager?", a: "<strong>Own it, Jordan 🔥</strong>Accountability means when something goes wrong on your shift, you don't look for who to blame — you look for how to fix it. You own your mistakes, you correct them, and you put systems in place so they don't happen again. A manager who can't be accountable can't ask accountability from their team. Period." },
    { cat: "Operations", q: "Craig, what does running a smooth shift actually mean?", a: "<strong>Talk about THIS, Gobber 🙌</strong>It means your team knows their roles before the rush hits. Communication is clear. Product quality is consistent. Customers are happy. And YOU are proactive, not reactive. A smooth shift doesn't happen by accident — it's built by a manager who shows up prepared. That manager is you, babe." },
    { cat: "Operations", q: "Jordan, you're short-staffed during a rush. What do you do?", a: "<strong>Don't panic — SOLVE, Craig 🔥</strong>Assess immediately: who's strongest, where's the bottleneck? Put your best people at the pressure points and flex yourself in where needed. Communicate — everyone knows the plan. Never let the customer see the chaos. Calm on the outside, solving on the inside. That's the ASM move." },
    { cat: "Operations", q: "Gobber, how do you make sure food safety standards are met every shift?", a: "<strong>Non-negotiable, Babe 🛑</strong>You make it part of the culture, not just a checklist. Temps, FIFO, hold times, handwashing — these are the standard, not optional. You lead by doing it yourself first. And when someone cuts corners you address it immediately and privately. Food safety protects your team AND your customers. No exceptions." },
    { cat: "Operations", q: "Babe, a customer complaint comes in during your busiest moment. What do you do?", a: "<strong>SUPASTAR move, Jordan 🌟</strong>You stop and handle it. Yes, even during the rush. Apologize sincerely, make it right fast, no interrogation. Then go back to your team and find the root cause so it doesn't happen again. Customers don't forget how you made them feel — good or bad. Make it good, Craig." },
    { cat: "Operations", q: "Craig, walk me through your approach to opening the store.", a: "<strong>This is where they see YOUR standards, Gobber 💼</strong>You arrive early — not on time, EARLY. You walk the entire store before your team clocks in. You know exactly what condition it's in. You set the tone before a single customer walks through the door. Opening sets the whole shift. You own that first 30 minutes, babe." },
    { cat: "Financials", q: "Jordan, what is food cost and how do you keep it under control?", a: "<strong>Know this cold, Craig 📊</strong>Food cost % = Cost of food used ÷ Total sales × 100. Target is 28–32% in QSR. You control it through proper portioning, reducing waste, accurate inventory counts, and watching for theft. Every dollar wasted comes off the bottom line — and off your performance review, Gobber." },
    { cat: "Financials", q: "Babe, how does labor scheduling affect the store's profitability?", a: "<strong>This one's big, Jordan 💰</strong>Labor usually runs 25–35% of revenue. You schedule based on PROJECTED sales, not just who's available. Over-staffing kills margin. Under-staffing kills service quality. The ASM who masters the schedule controls one of the biggest cost levers in the whole store. That's power, Craig. Use it wisely." },
    { cat: "Financials", q: "Gobber, how do you drive sales without a marketing budget?", a: "<strong>SUPASTAR move right here 🌟</strong>Upselling. Every single transaction is an opportunity. Train your crew to do it naturally — 'Want to add a dessert?' 'Can I make that a combo?' Even +$0.50 per customer compounds to hundreds of dollars per shift. That's YOUR impact on revenue, babe. Own it." },
    { cat: "Financials", q: "Craig, you notice unexplained inventory loss. What do you do?", a: "<strong>Stay sharp, Jordan 🔍</strong>Investigate before you accuse anyone. Check waste logs, portioning consistency, receiving records first. If theft is suspected after that, you involve your GM and HR — you don't go rogue. Protect the business AND your team by being fair and thorough. Document every step, Gobber." },
    { cat: "People & Conflict", q: "Babe, two crew members are beefing on your shift. What do you do?", a: "<strong>Address it FAST, Craig ⚡</strong>Separate them immediately — the floor is not the place for drama. Hear each side privately, never together first. Find the actual root. Set a clear standard: professional behavior is non-negotiable on MY shift. Document it. Escalate if it continues. But a real private conversation fixes it most of the time, Jordan." },
    { cat: "People & Conflict", q: "Jordan, a customer is getting loud and disrespectful to your cashier.", a: "<strong>Step in RIGHT NOW, Gobber 🛡️</strong>You step in immediately and you redirect that energy to yourself. 'Hi, I'm the manager — let me help you.' Your crew should NEVER have to fight that battle alone. Handle the customer with professionalism, resolve it, then check on your team member privately after. Protecting your people earns their loyalty forever, babe." },
    { cat: "People & Conflict", q: "Craig, your GM makes a decision you think is wrong. What do you do?", a: "<strong>Be strategic, Jordan 🧠</strong>You bring it up privately and at the right moment — not during a rush, not in front of the crew. Come with observations and data, not just feelings. 'I've noticed X is causing Y — can we talk about it?' You are not a pushover but you are also not insubordinate. Respectful, professional, one time. Then you execute. That's the move, Gobber." },
    { cat: "People & Conflict", q: "Gobber, how do you give critical feedback without crushing someone?", a: "<strong>This is a real skill, Babe 🎯</strong>Be specific, not personal. 'Your hold times were 3 minutes over' is feedback. 'You never do anything right' is an attack. Lead with what they did well when you can. Explain the impact. Give them a clear path to improve. Praise in public, correct in private. Always, Craig. Without exception." },
  ];

  const quizData = [
    { q: "Babe, what's the FIRST thing you do when you arrive for your ASM shift?", opts: ["Check your phone for messages","Walk the store and assess conditions","Wait for the last manager to brief you","Start updating the schedule"], ans: 1, exp: "Walk that store, Gobber! Know exactly what you're working with before the team arrives." },
    { q: "Craig, a team member makes the same mistake THREE times. Your move?", opts: ["Write them up on the spot","Ignore it — everyone slips","Have a private retraining conversation and set a clear timeline","Go vent to the GM about them"], ans: 2, exp: "Private conversation and real retraining first — always, Jordan." },
    { q: "Gobber, what does FIFO mean in food operations?", opts: ["First In, First Out","Food In, Food Out","Fresh Inventory, Fresh Output","Fast Items, Final Order"], ans: 0, exp: "First In, First Out. This keeps product fresh and kills waste." },
    { q: "Babe, labor cost should typically be what % of QSR revenue?", opts: ["10–15%","25–35%","45–50%","55–65%"], ans: 1, exp: "25–35% is the target, Craig. The ASM who nails the schedule controls this number." },
    { q: "Jordan, what is the STAR method used for in an interview?", opts: ["Describing your daily schedule","Structuring your behavioral answers","Calculating food cost percentages","Training new crew members"], ans: 1, exp: "Situation, Task, Action, Result — that's how you tell a story that lands." },
    { q: "Craig, hot food must be held above what temperature?", opts: ["120°F","130°F","140°F","160°F"], ans: 2, exp: "140°F minimum, babe. Food safety is never optional." },
    { q: "Gobber, a customer is yelling at your cashier. What do you do FIRST?", opts: ["Tell the cashier to handle it","Call the GM right away","Step in and redirect the customer to yourself","Ask the customer to leave immediately"], ans: 2, exp: "You PROTECT your crew, Jordan. Step in immediately." },
    { q: "Babe, the best way to build respect as a new manager is:", opts: ["Remind everyone you're in charge","Lead by example and be consistent every shift","Be the strictest person on the floor","Be everyone's best friend"], ans: 1, exp: "Consistency and leading by example — that's it, Craig." },
    { q: "Jordan, you disagree with a GM decision. What's the right move?", opts: ["Vent about it to the crew","Refuse to carry out the decision","Address it privately and professionally, then execute","Post your frustration on social media"], ans: 2, exp: "Private, professional, one time — then you execute." },
    { q: "Craig, what separates a good ASM from a truly great one?", opts: ["Working the longest hours","Never ever making a mistake","Building a team that runs well even without you watching","Being the GM's favorite person"], ans: 2, exp: "SUPASTAR answer! A great ASM builds people and systems." },
  ];

  const tips = [
    { icon: "💍", title: "Gobber, I Need You to Read This First", body: "I built this for you because I believe in you more than you believe in yourself some days. You are smart, you are capable, you have been ready for this. This interview is just them finally catching up to what I already know about you. Now stop doubting and let's get to WORK. I love you, babe. 🔥" },
    { icon: "🌟", title: "SUPASTAR Energy Only, Craig", body: "Walk in there like you already have the job. Not arrogant — CONFIDENT. There is a difference. You know this industry. You know how to lead people. You know how to handle pressure. OWN that the moment you walk through that door." },
    { icon: "💬", title: "Babe, Use STAR for Every Story Question", body: "Any time they say 'tell me about a time...' you go straight to STAR:<ul><li><strong>Situation</strong> — set the scene fast</li><li><strong>Task</strong> — what needed to happen</li><li><strong>Action</strong> — what YOU did (say 'I', not 'we')</li><li><strong>Result</strong> — what changed because of YOU</li></ul>Practice this out loud, Gobber." },
    { icon: "👑", title: "Jordan, Lead With Your Leadership Stories", body: "They want someone who can RUN A FLOOR. Give them real stories — times you stepped up, solved a problem, motivated someone, handled conflict calmly. Be specific. Vague answers lose. Specific real stories WIN every time, Craig." },
    { icon: "💪", title: "Gobber, Your Work Ethic IS Your Resume", body: "Talk about how you show up. The shift you covered last minute. The problem you fixed before anyone asked. They can teach skills — they CANNOT teach the drive you already have. Make sure they know that, babe." },
    { icon: "📊", title: "Babe, Know These Numbers Cold", body: "They will ask about metrics. Have these ready:<ul><li>Food cost target: 28–32% of revenue</li><li>Labor cost target: 25–35% of revenue</li><li>Drive-thru speed target: under 3 minutes</li></ul>Even estimating shows analytical thinking." },
    { icon: "❓", title: "Jordan, Ask THEM These Questions", body: "Ask these:<ul><li>'What does success look like in my first 90 days here?'</li><li>'What is the biggest challenge this team is facing right now?'</li><li>'How do you invest in your managers' development?'</li></ul>Smart questions show you're already thinking like a leader." },
    { icon: "👔", title: "Craig, Show Up Like You Already Have the Job", body: "Business casual minimum — clean, pressed, put together. Arrive 10 minutes early. Bring your resume printed. Firm handshake, real eye contact, genuine warm energy. Walk in looking and feeling like THAT person, babe." },
    { icon: "🧠", title: "Gobber, Think Out Loud in Systems", body: "Great ASMs don't just react — they BUILD systems. Talk about checklists, how you standardize quality, how you train to prevent problems before they happen. Use language like 'I would implement' and 'my approach would be.'" },
    { icon: "❤️", title: "Craig, From Me to You — Final Words", body: "Bye, self-doubt. Bye, imposter syndrome. Bye, 'what if I'm not ready.' You ARE ready. You have always been ready. I have watched you handle hard situations with more grace than people twice your age. Go in that room and show them exactly who Craig Jordan is. I will be right here waiting when you walk out with that job. 👑🔥" },
  ];

  // ==================== ENCOURAGEMENT POOLS ====================
  const correctEncouragements = [
    "SUPASTAR! That's exactly right, Gobber! 🌟", "Yesss Craig, I KNEW you knew that! 🔥",
    "That's my babe right there 👑", "See?! You already know this stuff, Jordan!",
    "Locked. In. Let's GOOO 💪", "Bye doubt, hello FACTS — you got it!",
    "That's the one, Gobber — keep that energy!", "I am so proud of you right now ❤️",
  ];

  const wrongEncouragements = [
    "It's okay babe, that's literally why we're doing this 💕", "Almost, Craig — you're right there, just tighten it up.",
    "Bye that answer, hello the RIGHT one — you got this.", "Don't overthink it, Gobber — shake it off and go again.",
    "One wrong answer doesn't define you, Jordan. Next one's yours.", "You're still doing great ❤️ keep pushing.",
    "It's all good babe — learn it and move on strong.",
  ];

  const miniBoosts = [
    "Stay focused Gobber, you're doing SO good 👊", "Keep going Craig, I am proud of you ❤️",
    "One more step closer to that ASM title 🔥", "You got this, Jordan — don't second guess yourself.",
    "SUPASTAR energy only from here, babe 🌟", "Right here with you every step of the way ❤️",
    "Every question makes you sharper. That's facts.", "Bye nerves — hello CONFIDENCE, Craig 👑",
  ];

  function getRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  // ==================== STATE ====================
  let currentCard = 0;
  let filteredCards = [...flashcards];
  let activeCategory = 'All';

  const MAX_DRILL_ROUNDS = 3;
  let quizQueue = [...quizData].sort(() => Math.random() - 0.5);
  let weakSpots = [];
  let quizIndex = 0;
  let roundNum = 1;
  let firstPassScore = 0;
  let quizAnswered = false;

  // ==================== TABS ====================
  function switchTab(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('screen-' + id).classList.add('active');
    event.target.classList.add('active');
  }

  // ==================== FLASHCARDS ====================
  const categories = ['All', ...new Set(flashcards.map(f => f.cat))];

  function buildCatFilter() {
    const wrap = document.getElementById('cat-filter');
    categories.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'cat-btn' + (cat === 'All' ? ' active' : '');
      btn.textContent = cat;
      btn.onclick = () => {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeCategory = cat;
        filteredCards = cat === 'All' ? [...flashcards] : flashcards.filter(f => f.cat === cat);
        currentCard = 0;
        updateCard();
      };
      wrap.appendChild(btn);
    });
  }

  function updateCard() {
    const card = filteredCards[currentCard];
    document.getElementById('fc-category').textContent = card.cat.toUpperCase();
    document.getElementById('fc-question').textContent = card.q;
    document.getElementById('fc-answer').innerHTML = card.a;
    document.getElementById('card-current').textContent = currentCard + 1;
    document.getElementById('card-total').textContent = filteredCards.length;
    document.getElementById('prev-btn').disabled = currentCard === 0;
    document.getElementById('next-btn').disabled = currentCard === filteredCards.length - 1;
    document.getElementById('flashcard').classList.remove('flipped');
  }

  function flipCard() { document.getElementById('flashcard').classList.toggle('flipped'); }
  function prevCard() { if (currentCard > 0) { currentCard--; updateCard(); } }
  function nextCard() { if (currentCard < filteredCards.length - 1) { currentCard++; updateCard(); } }

  // ==================== QUIZ ====================
  function loadQuestion() {
    const q = quizQueue[quizIndex];
    quizAnswered = false;
    document.getElementById('quiz-q-num').textContent = `Question ${quizIndex + 1} of ${quizQueue.length}${roundNum > 1 ? ' (drill)' : ''}`;
    document.getElementById('quiz-q-text').textContent = q.q;
    document.getElementById('quiz-bar').style.width = `${(quizIndex / quizQueue.length) * 100}%`;
    document.getElementById('quiz-next').classList.remove('show');
    const fb = document.getElementById('quiz-feedback');
    fb.classList.remove('show', 'correct-fb', 'wrong-fb');
    const optWrap = document.getElementById('quiz-options');
    optWrap.innerHTML = '';
    q.opts.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'quiz-opt';
      btn.textContent = opt;
      btn.onclick = () => answerQuestion(i);
      optWrap.appendChild(btn);
    });
  }

  function answerQuestion(chosen) {
    if (quizAnswered) return;
    quizAnswered = true;
    const q = quizQueue[quizIndex];
    const opts = document.querySelectorAll('.quiz-opt');
    const fb = document.getElementById('quiz-feedback');
    opts.forEach((btn, i) => {
      btn.disabled = true;
      if (i === q.ans) btn.classList.add('correct');
      if (i === chosen && i !== q.ans) btn.classList.add('wrong');
    });
    if (chosen === q.ans) {
      if (roundNum === 1) firstPassScore++;
      fb.className = 'quiz-feedback show correct-fb';
      fb.textContent = '✅ ' + getRandom(correctEncouragements) + ' — ' + q.exp;
    } else {
      if (!weakSpots.some(item => item.q === q.q)) weakSpots.push(q);
      fb.className = 'quiz-feedback show wrong-fb';
      fb.textContent = '❌ ' + getRandom(wrongEncouragements) + ' — ' + q.exp;
    }
    document.getElementById('quiz-next').classList.add('show');
  }

  function nextQuestion() {
    quizIndex++;
    if (quizIndex >= quizQueue.length) {
      if (weakSpots.length > 0 && roundNum < MAX_DRILL_ROUNDS) {
        startDrillRound();
      } else {
        showScore();
      }
      return;
    }
    const qText = document.getElementById('quiz-q-text');
    qText.textContent = getRandom(miniBoosts);
    document.getElementById('quiz-next').classList.remove('show');
    setTimeout(() => loadQuestion(), 1100);
  }

  function startDrillRound() {
    roundNum++;
    quizQueue = [...weakSpots].sort(() => Math.random() - 0.5);
    weakSpots = [];
    quizIndex = 0;
    document.getElementById('quiz-q-text').textContent = "🔁 Locking in your weak spots, Jordan...";
    document.getElementById('quiz-options').innerHTML = '';
    document.getElementById('quiz-feedback').classList.remove('show', 'correct-fb', 'wrong-fb');
    document.getElementById('quiz-next').classList.remove('show');
    setTimeout(() => loadQuestion(), 1300);
  }

  function showScore() {
    document.getElementById('quiz-area').style.display = 'none';
    const ss = document.getElementById('score-screen');
    ss.classList.add('show');
    const pct = Math.round((firstPassScore / quizData.length) * 100);
    document.getElementById('score-num').textContent = `${firstPassScore}/${quizData.length}`;
    document.getElementById('quiz-bar').style.width = '100%';
    let title, msg, stars;
    if (pct >= 90) { title = "Jordan's On Fire!"; msg = "Outstanding! You're ready to lead the flame."; stars = "🔥🔥🔥🔥🔥"; }
    else if (pct >= 70) { title = "Getting Grilled Right"; msg = "Solid run, Jordan! Review the ones you missed."; stars = "🔥🔥🔥🔥"; }
    else if (pct >= 50) { title = "Warming Up, Jordan"; msg = "Good start! Go back through the flashcards."; stars = "🔥🔥🔥"; }
    else { title = "Keep Going, Jordan"; msg = "That's what practice is for! Review and try again."; stars = "🔥🔥"; }
    document.getElementById('score-title').textContent = title;
    document.getElementById('score-msg').textContent = msg;
    document.getElementById('score-stars').textContent = stars;
  }

  function restartQuiz() {
    quizQueue = [...quizData].sort(() => Math.random() - 0.5);
    weakSpots = [];
    quizIndex = 0; roundNum = 1; firstPassScore = 0;
    document.getElementById('quiz-area').style.display = 'block';
    document.getElementById('score-screen').classList.remove('show');
    loadQuestion();
  }

  // ==================== TIPS ====================
  function buildTips() {
    const wrap = document.getElementById('tips-list');
    tips.forEach(t => {
      wrap.innerHTML += `<div class="tip-card"><div class="tip-header"><div class="tip-icon">${t.icon}</div><div class="tip-title">${t.title}</div></div><div class="tip-body">${t.body}</div></div>`;
    });
  }

  // ==================== INIT ====================
  buildCatFilter();
  updateCard();
  loadQuestion();
  buildTips();
</script>
</body>
</html>
